<script>
const STATUS = {
    PENDING: "Pending",
    ON_WAY: "On Way",
    DELIVERED: "Delivered"
};

let card = document.querySelector(".card");


// ==========================
// FETCH ORDERS
// ==========================
fetch("/show/orders/on/site")
    .then(res => res.json())
    .then(data => {

        let total = 0;
        card.innerHTML = "";
        data.forEach(item => {

            card.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.paymob_order_id}</td>

                <td class="priceTable">${item.amount}</td>
                <td>${item.first_name + " " + item.last_name}</td>
                <td>${item.email}</td>
                <td>${item.phone}</td>
                <td>${item.country}</td>
                <td>${item.address}</td>
                <td>${item.created_at}</td>
                <td class="deliveredText">${item.status || "Pending"}</td>
                <td>${item.pay_status||""}</td>
                
                
                <td>
                    <button class="doneBtn btnTable" data-id="${item.id}">DONE</button>
                    <button class="changeStatusBtn btnTable" data-id="${item.id}">Change Status</button>
                </td>
            </tr>`;



            function updateTotalPrice() {

                if (item.pay_status === "paid") {
                    total += Number(item.amount);
                    document.querySelector(".totalOrderPrice").textContent = total;
                }
            }

            
            
         
           
            applyColors();
            updateTotalPrice();
        });

    

    })
    .catch(err => console.log("FETCH ERROR:", err));


// ==========================
// CHANGE STATUS (DB UPDATE)
// ==========================



document.addEventListener("click", function (e) {

    if (e.target.classList.contains("changeStatusBtn")) {

        let id = e.target.dataset.id;
        let row = e.target.closest("tr");
        let text = row.querySelector(".deliveredText");

        let current = text.textContent.trim();
        let next;

        if (current === STATUS.PENDING) next = STATUS.ON_WAY;
        else if (current === STATUS.ON_WAY) next = STATUS.DELIVERED;
        else next = STATUS.PENDING;

        // UI update
        text.textContent = next;
        applyColor(text, next);

        // ==========================
        // DATABASE UPDATE
        // ==========================
        fetch("/orders/status/update", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: id,
                status: next
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("DB UPDATED:", data);
        })
        .catch(err => console.log("UPDATE ERROR:", err));
    }
});



// ==========================
// APPLY COLORS
// ==========================
function applyColor(el, status) {

    el.classList.remove("pending", "onway", "delivered");

    if (status === STATUS.PENDING) el.classList.add("pending");
    else if (status === STATUS.ON_WAY) el.classList.add("onway");
    else if (status === STATUS.DELIVERED) el.classList.add("delivered");
}


// ==========================
// APPLY COLORS ON LOAD
// ==========================
function applyColors() {

    document.querySelectorAll(".deliveredText").forEach(el => {
        applyColor(el, el.textContent.trim());
    });
}


// ==========================
// DELETE ORDER
// ==========================



card.addEventListener("click", function (e) {
    if (e.target.classList.contains("doneBtn")) {
        const id = e.target.dataset.id;
        const row = e.target.closest("tr");
        
        // البحث عن حالة "التوصيل" داخل الصف المختار فقط وليس كل الصفحة
        const statusText = row.querySelector(".deliveredText");

        // التأكد من أن حالة الطلب "Delivered" قبل إظهار التنبيه
        if (statusText && statusText.textContent.trim() === "Delivered") {
            Swal.fire({
                title: "هل أنت متأكد؟",
                text: "لن تتمكن من استرجاع الطلب بعد النقل!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "نعم، انقل الطلب",
                cancelButtonText: "إلغاء"
            }).then((result) => {
                if (result.isConfirmed) {
                    // إرسال الطلب للخادم
                    fetch(`/orders/done/${id}`, {
                        method: "POST"
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            row.remove(); // حذف الصف من الجدول
                            Swal.fire({
                                title: "تم النقل!",
                                icon: "success"
                            });
                        }
                    })
                    .catch(err => console.error("ERROR:", err));
                }
            });
        } else {
            // تنبيه اختياري إذا حاول المستخدم النقل والطلب لم يكتمل بعد
            Swal.fire("تنبيه", "يجب أن تكون حالة الطلب Delivered أولاً", "info");
        }
    }
});


</script>
