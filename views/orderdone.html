<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orderDone</title>
    <style>
         body{
            background-color: #111;
        }
        .continer{
            display: flex;
            width: 100%;
        }
        .sideControl{
                width: 20%;
                background-color: #ffffff0d;
                margin-right: 30px;
                margin-top: 10px;
                margin-left:10px;
                height: 80vh;
                box-shadow: 0px 0px 6px 0px beige;
                
                .controls{
                    display: flex;
                    gap:30px;
                    flex-direction: column;
                
                    h2{
                        display: flex;
                        justify-self: center;
                        align-self: center;
                        padding-top: 10px;
                                 color: wheat;
                    }
                }
                .aLink{
                    text-decoration: none;
                }
                .ordersBtn {
                    background-color: #ffffff;
                    display: flex;
                    width: 90%;
                    justify-content: center;
                    align-items: center;
                    justify-self: center;
                    margin-top: 10px;
                    height: 60px;
                    color: black;
                    border-radius: 40px;
                    font-size: 18px;
                    font-weight: bold;
            }
            .ordersBtn:hover{
                width: 90%;
                cursor: pointer;
                box-shadow: 0px 0px 4px 2px wheat;
                background-color: #111;
                color: white;
                transition: 0.2s;
            }
        }
.main{
                
               background: #ffffff0d;
        margin: 20px 0;
        box-shadow: 0px 0px 6px 0px beige;
            }
            .totalDiv{
                text-align: center;
                font-size: 30px;
                color: beige;
            }
            .tableLable{
                    color: wheat;
            }
            .ordarStauts{
                color: white;
                padding: 20px 0;
            }
            td, th {
    padding: 10px 15px;
}   
.card{
    color:white;
}
          
         .pending {
    color: gray;
    font-weight: bold;
}

.onway {
    color: orange;
    font-weight: bold;
}

.delivered {
    color: green;
    font-weight: bold;
}      
        
        
    </style>
</head>
<body>
     <div class="continer">
        <div class="sideControl">
                <div class="controls">
                    <h2 >Admin Dashbord</h2>
                        <a class="aLink" href="/">
                            <button class="ordersBtn">store</button>
                        </a>
                        <a class="aLink" href="/admin/dashbord/order">
                            <button class="ordersBtn active">orders</button>
                        </a>
                        <a class="aLink" href="/admin/dashbord/orders-items">
                            <button class="ordersBtn">orders Items</button>
                        </a>
                        <a class="aLink" href="/admin/dashbord/add-product">
                            <button class="ordersBtn">Add New Product</button>
                        </a>
                        <a class="aLink" href="/admin/dashbord/order_done">
                            <button class="ordersBtn">done orders</button>
                        </a>
                        <a class="aLink" href="/admin/dashbord/restock">
                            <button class="ordersBtn">ReStock</button>
                        </a>
                </div>
            </div>

             <div class="main">

        <table>
  <thead class="tableLable">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Amount</th>
      <th>pay_status</th>
      <th>status</th>
      
      
    </tr>
  </thead>

  <tbody class="card"></tbody>
</table>
<div class="totalDiv">مجموع الطلبات <span class="totalOrderPrice"></span></div>
       </div>
    </div>
<script>
    fetch("/insert/done/orders/on/orderdone.html").then(data=>data.json()).then(result=>{
        let card =document.querySelector(".card")
        card.innerHTML = "";
        let total = 0;
        result.forEach(data => {
            card.innerHTML+=`
            <tr>
                <td>${data.id}</td>
                <td>${data.name}</td>
                <td>${data.email}</td>
                <td>${data.phone}</td>
                <td>${data.amount}</td>
                <td>${data.pay_status}</td>
                <td>${data.status}</td>
            </tr>  
            
            `
            total+= data.amount
        });
        let total_price_text=  document.querySelector(".totalOrderPrice")
        total_price_text.textContent=total
    })
</script>

</body>
</html>
