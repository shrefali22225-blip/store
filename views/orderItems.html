<body>
    <div class="continer">
        <div class="sideControl">
                <div class="controls">
                    <h2 >Admin Dashbord</h2>

       <div class="main">
        <div class="search_id_div">
            <input type="number" id="orderId" placeholder="Enter Order ID">
            <button onclick="getOrder()">Search</button>
        </div>

    <table>
  <thead class="tableLable">
    <tr>
      <th>id</th>
      <th>proudct_name</th>
      <th>order-id</th>
      <th>proudct_id</th>
      <th>quntity</th>
      <th>price</th>
        
    </tr>
  </thead>

  <tbody class="card"></tbody>
</table>
<div class="totalDiv">مجموع الطلبات <span class="totalOrderPrice"></span></div>
       </div>
    </div>
    <script>
        let card =document.querySelector(".card")
        fetch("/api/orders_items").then(result=>result.json()).then(data=>{
           
                
                card.innerHTML=""
                let total= 0
                data.forEach(info => {
                       card.innerHTML+=`
                       <tr>
                           <td>${info.id}</td>
                           <td>${info.product_name}</td>
                           <td>${info.order_id}</td>
                           <td>${info.product_id}</td>
                           <td>${info.quantity}</td>
                           <td>${info.price}</td>
                        </tr>   
                       `
                       total+= info.quantity*info.price
                    })
                 
                    let totalPriceText= document.querySelector(".totalOrderPrice")
                    totalPriceText.textContent= total
                });
        
    </script>
    <script src="/public/js/filter_orders_items.js"></script>
